[build]
  command = "cd app && npm install && npm run build"
  publish = "app/dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# Branch pushes (non-main, non-PR) never trigger a deploy
[context.branch-deploy]
  ignore = "exit 0"

[[redirects]]
  from = "/api/stock-price"
  to = "/.netlify/functions/stock-price"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
