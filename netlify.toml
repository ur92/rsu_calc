# Netlify deployment configuration for rsu_calc (rsucalcjfrog)
#
# Cost model:
#   - Deploy previews (PR-triggered): FREE and unlimited — Netlify builds from git.
#   - Production deploys: ~15 credits — script builds LOCALLY and uploads a ZIP directly.
#     No build runs on Netlify's servers, so no build-minute credits are consumed.
#
# Workflow:
#   - Open a PR for any feature branch → free deploy preview generated automatically.
#   - Production deploys are triggered manually:
#       export NETLIFY_AUTH_TOKEN=<personal-access-token>
#       scripts/deploy.sh             # build locally + upload ZIP
#       scripts/deploy.sh --wait      # same + poll until live
#     (Token: https://app.netlify.com/user/applications#personal-access-tokens)
#
# Why local build + ZIP upload instead of git-triggered build:
#   1. Saves ~60 credits per deploy (no npm install / vite build on Netlify servers).
#   2. The corporate Zscaler proxy blocks `npx netlify-cli` (unstorage@^1.16.1 is
#      curated out in JFrog), so we use curl with the Netlify REST API directly.

[build]
  command = "cd app && npm install && npm run build"
  publish = "app/dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

[context.deploy-preview]
  command = "cd app && npm install && npm run build"

[context.branch-deploy]
  ignore = "exit 0"

# Production git-push builds are disabled; deploys happen via scripts/deploy.sh.
[context.production]
  ignore = "exit 0"

[[redirects]]
  from = "/api/stock-price"
  to = "/.netlify/functions/stock-price"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
