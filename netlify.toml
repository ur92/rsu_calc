# Netlify deployment configuration for rsu_calc (rsucalcjfrog)
#
# Cost model:
#   - Deploy previews (PR-triggered): FREE and unlimited
#   - Production deploys (main branch): DISABLED — manual CLI deploys only
#   - Branch deploys (non-PR push): DISABLED to save credits
#
# Workflow:
#   - Open a PR for any feature branch -> free deploy preview generated automatically.
#   - Production deploys are triggered manually via the direct Netlify API:
#       export NETLIFY_AUTH_TOKEN=<personal-access-token>
#       scripts/deploy.sh             # production
#       scripts/deploy.sh --draft     # draft / preview
#     (Token: https://app.netlify.com/user/applications#personal-access-tokens)
#     The corporate Zscaler proxy redirects all npm traffic through JFrog,
#     where unstorage@^1.16.1 is curated out, so `npx netlify-cli` can't
#     install on this network — hence the direct-API script.

[build]
  command = "cd app && npm install && npm run build"
  publish = "app/dist"

[build.environment]
  NODE_VERSION = "22"

[context.deploy-preview]
  command = "cd app && npm install && npm run build"

[context.branch-deploy]
  ignore = "exit 0"

# Skip Git-triggered production builds. Manual `netlify deploy --prod` from
# the CLI bypasses this because it uploads pre-built artifacts directly.
[context.production]
  ignore = "exit 0"

[[edge_functions]]
  path = "/api/stock-price"
  function = "stockPrice"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
